<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grundejerforeningen Borrehøj</title>
    <meta name="description" content="Grundejerforeningen Borrehøj – Falkenkær og Amerikavej, 8883 Gjern. Se aktiviteter, dokumenter og kontaktoplysninger.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://www.grundejerforeningen-borrehøj.dk/">

    <!-- Open Graph -->
    <meta property="og:title" content="Grundejerforeningen Borrehøj">
    <meta property="og:description" content="Grundejerforeningen Borrehøj – Falkenkær og Amerikavej, 8883 Gjern. Se aktiviteter, dokumenter og kontaktoplysninger.">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="da_DK">
    <meta property="og:url" content="https://www.grundejerforeningen-borrehøj.dk/">

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Grundejerforeningen Borrehøj",
        "description": "Falkenkær og Amerikavej – 8883 Gjern",
        "url": "https://www.grundejerforeningen-borrehøj.dk"
    }
    </script>

    <script>
        // Fetch aktiviteter.html and parse the event date to determine redirect
        fetch('aktiviteter.html')
            .then(response => response.text())
            .then(html => {
                var parser = new DOMParser();
                var doc = parser.parseFromString(html, 'text/html');
                var dateText = doc.querySelector('.event-date').textContent;

                var months = {
                    'januar': 0, 'februar': 1, 'marts': 2, 'april': 3,
                    'maj': 4, 'juni': 5, 'juli': 6, 'august': 7,
                    'september': 8, 'oktober': 9, 'november': 10, 'december': 11
                };

                var match = dateText.match(/(\d+)\.\s*(\w+)\s*(\d{4})/);
                if (match) {
                    var day = parseInt(match[1]);
                    var month = months[match[2].toLowerCase()];
                    var year = parseInt(match[3]);
                    var eventDate = new Date(year, month, day);
                    eventDate.setDate(eventDate.getDate() + 1); // One day after
                    var today = new Date();
                    today.setHours(0, 0, 0, 0);

                    if (today > eventDate) {
                        window.location.replace('kontakt.html');
                    } else {
                        window.location.replace('aktiviteter.html');
                    }
                } else {
                    window.location.replace('kontakt.html');
                }
            })
            .catch(() => {
                window.location.replace('kontakt.html');
            });
    </script>
</head>
<body>
    <noscript>
        <p>Grundejerforeningen Borrehøj – Falkenkær og Amerikavej, 8883 Gjern</p>
        <p><a href="aktiviteter.html">Se aktiviteter</a> | <a href="kontakt.html">Kontakt</a></p>
    </noscript>
</body>
</html>
